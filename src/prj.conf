# Component selection for the MCXA266 blink demo.
# Symbol names match the SDK Kconfig: CONFIG_MCUX_COMPONENT_<component id>.

# Device startup (vector table, SystemInit, CMSIS device headers)
CONFIG_MCUX_COMPONENT_device.CMSIS=y
CONFIG_MCUX_COMPONENT_device.system=y
CONFIG_MCUX_COMPONENT_device.startup=y

# Minimal driver set for a GPIO blink. Each entry is pulled in by code that is
# actually compiled in this project:
#   common - driver base (status codes, common helpers)
#   clock  - CLOCK_EnableClock(), used by board/clock_config.c and board/pin_mux.c
#   reset  - RESET_ReleasePeripheralReset(), used by board/pin_mux.c
#   mcx_spc - board/clock_config.c configures the core LDO / SRAM voltage (fsl_spc.h)
#   port   - pin mux configuration in board/pin_mux.c
#   gpio   - GPIO_PinInit() / GPIO_PinWrite() for the LED (board/pin_mux.c, main.cpp)
CONFIG_MCUX_COMPONENT_driver.common=y
CONFIG_MCUX_COMPONENT_driver.clock=y
CONFIG_MCUX_COMPONENT_driver.reset=y
CONFIG_MCUX_COMPONENT_driver.mcx_spc=y
CONFIG_MCUX_COMPONENT_driver.port=y
CONFIG_MCUX_COMPONENT_driver.gpio=y
